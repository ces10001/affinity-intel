name: ATHENA Scrape

on:
  schedule:
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run ATHENA scraper
        working-directory: ./scraper
        env:
          HOODIE_REFRESH_TOKEN: ${{ secrets.HOODIE_REFRESH_TOKEN }}
        run: python scrape.py
        timeout-minutes: 25
      - name: Commit data
        run: |
          git config user.name "ATHENA Bot"
          git config user.email "bot@affinity.com"
          git add -A
          git diff --cached --quiet || git commit -m "ATHENA update $(date '+%Y-%m-%d %H:%M')"
          git pull --rebase || true
          git push
