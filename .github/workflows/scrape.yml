name: Scrape Competitors

on:
  schedule:
    - cron: '0 12,22 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        working-directory: ./scraper
        run: python run.py
        timeout-minutes: 30

      - name: Convert to dashboard format
        working-directory: ./scraper
        run: python convert.py --output ../dashboard_data.json

      - name: Commit updated data
        run: |
          git config user.name "Affinity Intel Bot"
          git config user.email "bot@affinity.com"
          git add dashboard_data.json
          git diff --cached --quiet || git commit -m "Auto-update $(date '+%Y-%m-%d %H:%M')"
          git push
